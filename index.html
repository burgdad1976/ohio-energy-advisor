<body>

<!-- ================= HEADER ================= -->
<header>
  <div class="header-inner">
    <a class="logo" href="/">Ohio <span>Energy</span> Advisor</a>
  </div>
</header>

<div class="app">

<!-- ================= BILL UPLOAD ================= -->
<div id="bill-panel" class="panel active">
  <div class="card">
    <div class="lbl">Upload or describe your bill</div>

    <!-- ✅ CLICKABLE DROP ZONE -->
    <div class="drop-zone"
         id="drop-zone"
         onclick="document.getElementById('bill-file').click()"
         ondragover="event.preventDefault();this.classList.add('drag')"
         ondragleave="this.classList.remove('drag')"
         ondrop="handleDrop(event)">
      <div class="drop-icon">📄</div>
      <p>Drop your bill image here, or click to browse</p>
      <p style="font-size:12px;color:var(--text3);margin-top:5px;">
        JPG, PNG — your file stays in your browser
      </p>
    </div>

    <!-- ✅ FIXED FILE INPUT (THIS IS THE IMPORTANT PART) -->
    <input
      type="file"
      id="bill-file"
      accept="image/*"
      tabindex="-1"
      style="
        position:absolute;
        left:-9999px;
        width:1px;
        height:1px;
        opacity:0;
      "
      onchange="handleFile(this.files[0])"
    />

    <div class="divider"><span>or describe your charges</span></div>

    <textarea id="bill-text" rows="3"
